# Build and push container images to GHCR when a GitHub Release is
# published. Images are tagged with the release version (e.g. v1.0.0)
# and ``latest``.
#
# To cut a release:
#   1. Merge your PRs to master.
#   2. Create a tag: ``git tag v1.0.0 && git push origin v1.0.0``
#   3. Create a GitHub Release from the tag (UI or ``gh release create``).
#   4. This workflow triggers, builds all images, and pushes to GHCR.
#   5. Deploy by pointing your Helm values / docker-compose at the new tag.

name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/consentos

jobs:
  # ── Build and push the API image ─────────────────────────────────
  api:
    name: API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/consentos-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build and push the scanner image ─────────────────────────────
  scanner:
    name: Scanner image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/consentos-scanner
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: apps/scanner
          file: apps/scanner/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build and push the admin UI + banner image ───────────────────
  admin-ui:
    name: Admin UI image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/consentos-admin-ui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # Context is the repo root — the admin-ui Dockerfile pulls in
      # apps/banner/ alongside apps/admin-ui/ and bundles the banner
      # output at the nginx root.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
